version: "3.8"

services:
  nyaa-api-worker:
    build: .
    container_name: nyaa-api-worker
    ports:
      - "8787:8787"
    environment:
      # Required: RSA keys for authentication
      # Both literal newlines and escaped \n are supported
      # Use literal newlines in .env file (format below)
      # Use escaped \n when passing via command line: docker run -e "KEY=...\n..."
      NYAA_PUBLIC_KEY_PEM: "${NYAA_PUBLIC_KEY_PEM}"
      NYAA_PRIVATE_KEY_PEM: "${NYAA_PRIVATE_KEY_PEM}"

      # Optional: Custom redirect target
      # NYAAPI_REDIRECT_TO: "https://example.com"

    # Resource limits (adjust as needed)
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
        reservations:
          cpus: "0.5"
          memory: 256M

    # Restart policy
    restart: unless-stopped

    # Health check
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:8787/auth/public-key",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    # Volume for logs (optional)
    volumes:
      - ./logs:/app/logs

volumes:
  logs:
    driver: local
